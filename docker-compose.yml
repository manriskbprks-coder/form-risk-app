version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: app-risiko-lokal
    container_name: form_risk_app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - PORT=80
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=form_risk_db
      - DB_USERNAME=root
      - DB_PASSWORD=bpr_password_rahasia
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: form_risk_db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=form_risk_db
      - MYSQL_ROOT_PASSWORD=bpr_password_rahasia
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
